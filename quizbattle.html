<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QuizBattle for 다영 & 서영</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QuizBattle">
<meta name="theme-color" content="#0d0d1f">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<script>
(function(){
  const svg=encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="80" fill="#0d0d1f"/><text x="256" y="340" font-size="260" text-anchor="middle" fill="#f7c06a" font-family="Arial Black" font-weight="900">Q</text></svg>');
  const m={name:"QuizBattle",short_name:"QuizBattle",start_url:"./",display:"standalone",background_color:"#0d0d1f",theme_color:"#f7c06a",orientation:"portrait",icons:[{src:"data:image/svg+xml,"+svg,sizes:"512x512",type:"image/svg+xml"}]};
  const blob=new Blob([JSON.stringify(m)],{type:"application/json"});
  const link=document.createElement("link");link.rel="manifest";link.href=URL.createObjectURL(blob);document.head.appendChild(link);
})();
</script>
<style>
:root{
  --bg:#0d0d1f; --surface:#161628; --surface2:#1e1e38;
  --border:rgba(255,255,255,0.07);
  --science:#6af7b8; --science-bg:rgba(106,247,184,0.12);
  --social:#7c9ef7; --social-bg:rgba(124,158,247,0.12);
  --gold:#f7c06a; --gold-bg:rgba(247,192,106,0.12);
  --danger:#f76a6a; --accent:#f7c06a;
  --text:#f0eeff; --muted:rgba(240,238,255,0.42);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;}
.app{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;position:relative;}

/* NAV */
nav{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;}
.logo{font-family:'Jua',sans-serif;font-size:20px;line-height:1;}
.logo .q{color:var(--gold);}
.logo-sub{display:block;font-size:10px;font-weight:700;color:var(--muted);font-family:'Nunito',sans-serif;margin-top:1px;}
.nav-actions{display:flex;gap:4px;}
.nav-btn{background:none;border:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:5px 9px;border-radius:10px;cursor:pointer;transition:all 0.15s;}
.nav-btn:hover,.nav-btn.active{background:var(--surface2);color:var(--text);}
.nav-btn.active{color:var(--gold);}

/* SCREENS */
.screen{display:none;flex:1;flex-direction:column;padding:18px;}
.screen.active{display:flex;}

/* USER SELECT */
#screen-userselect{justify-content:center;align-items:center;gap:0;padding:40px 24px;}
.us-logo{font-family:'Jua',sans-serif;font-size:36px;text-align:center;margin-bottom:4px;}
.us-logo .q{color:var(--gold);}
.us-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:32px;}
.us-q{font-size:18px;font-weight:900;text-align:center;margin-bottom:18px;}
.us-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
.us-card{border:2px solid var(--border);border-radius:20px;padding:24px 14px;text-align:center;cursor:pointer;transition:all 0.18s;background:var(--surface);}
.us-card:hover{transform:translateY(-2px);}
.us-card.dy{border-color:rgba(106,247,184,0.3);}
.us-card.dy:hover{border-color:var(--science);background:var(--science-bg);}
.us-card.sy{border-color:rgba(124,158,247,0.3);}
.us-card.sy:hover{border-color:var(--social);background:var(--social-bg);}
.us-emoji{font-size:44px;margin-bottom:10px;}
.us-name{font-size:18px;font-weight:900;margin-bottom:3px;}
.us-grade{font-size:12px;color:var(--muted);}
#us-back{margin-top:22px;background:none;border:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:none;}

/* HOME */
.greeting{font-size:20px;font-weight:900;margin-bottom:3px;}
.wave{display:inline-block;animation:wave 1.5s ease-in-out infinite;}
@keyframes wave{0%,100%{transform:rotate(0)}30%{transform:rotate(20deg)}60%{transform:rotate(-10deg)}}
.date-str{color:var(--muted);font-size:12px;margin-bottom:16px;}

/* RANKING */
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.rank-title{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.rank-row:last-child{border-bottom:none;}
.rank-pos{font-size:18px;width:28px;text-align:center;}
.rank-name{flex:1;font-size:15px;font-weight:800;}
.rank-score{font-size:14px;font-weight:700;color:var(--gold);}
.rank-diff{font-size:11px;color:var(--muted);}

/* SUBJECT SELECT */
.section-hd{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;}
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.subj-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:16px 12px;text-align:center;cursor:pointer;transition:all 0.18s;}
.subj-card:hover:not(.locked){transform:translateY(-2px);}
.subj-card.sci{border-color:rgba(106,247,184,0.25);}
.subj-card.sci:hover,.subj-card.sci.selected{border-color:var(--science);background:var(--science-bg);}
.subj-card.soc{border-color:rgba(124,158,247,0.25);}
.subj-card.soc:hover,.subj-card.soc.selected{border-color:var(--social);background:var(--social-bg);}
.subj-icon{font-size:28px;margin-bottom:6px;}
.subj-name{font-size:14px;font-weight:900;}
.subj-cnt{font-size:11px;color:var(--muted);margin-top:3px;}
.btn-primary{background:var(--gold);color:#1a1200;border:none;padding:15px;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer;width:100%;transition:opacity 0.1s,transform 0.1s;}
.btn-primary:hover{opacity:0.9;} .btn-primary:active{transform:scale(0.98);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:13px;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;}

/* GAME */
.g-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.g-score-wrap{display:flex;flex-direction:column;}
.g-score{font-size:12px;color:var(--muted);font-weight:700;}
.g-score span{font-size:22px;font-weight:900;color:var(--gold);}
.g-subj-tag{font-size:10px;font-weight:900;padding:2px 8px;border-radius:99px;margin-top:3px;display:inline-block;}
.tag-sci{background:var(--science-bg);color:var(--science);}
.tag-soc{background:var(--social-bg);color:var(--social);}
.timer-wrap{display:flex;align-items:center;gap:8px;}
.combo-badge{background:var(--gold);color:#1a1200;font-size:11px;font-weight:900;padding:3px 9px;border-radius:99px;opacity:0;transition:opacity 0.2s;}
.combo-badge.show{opacity:1;}
.timer-circle{width:52px;height:52px;border-radius:50%;border:3px solid var(--surface2);position:relative;display:flex;align-items:center;justify-content:center;}
.timer-num{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}
.timer-svg{position:absolute;top:-3px;left:-3px;transform:rotate(-90deg);}
.q-counter{font-size:12px;color:var(--muted);margin-bottom:12px;}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:22px 18px;text-align:center;margin-bottom:16px;animation:slideIn 0.22s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.q-text{font-size:17px;font-weight:800;line-height:1.5;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.choice-btn{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius);padding:13px 10px;text-align:center;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;line-height:1.35;}
.choice-btn:hover:not(:disabled){border-color:var(--gold);background:var(--gold-bg);}
.choice-btn.correct{border-color:var(--science);background:var(--science-bg);color:var(--science);}
.choice-btn.wrong{border-color:var(--danger);background:rgba(247,106,106,0.12);color:var(--danger);}
.choice-btn:disabled{cursor:default;}
.feedback{text-align:center;font-size:13px;font-weight:800;height:22px;}
.feedback.correct{color:var(--science);} .feedback.wrong{color:var(--danger);}

/* RESULT */
.result-wrap{text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;}
.r-emoji{font-size:60px;margin-bottom:12px;}
.r-title{font-size:26px;font-weight:900;margin-bottom:4px;}
.r-sub{color:var(--muted);font-size:14px;margin-bottom:18px;}
.r-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-bottom:24px;}
.rs-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.rs-val{font-size:22px;font-weight:900;margin-bottom:2px;}
.rs-label{font-size:10px;color:var(--muted);font-weight:700;}

/* RANKING SCREEN */
.week-label{font-size:11px;color:var(--muted);text-align:right;margin-bottom:8px;}
.rank-big{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.rank-big-header{padding:12px 16px;font-size:12px;font-weight:800;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.rank-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--border);}
.rank-item:last-child{border-bottom:none;}
.rank-medal{font-size:22px;width:30px;text-align:center;}
.rank-info{flex:1;}
.rank-info-name{font-size:16px;font-weight:900;}
.rank-info-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.rank-pts{text-align:right;}
.rank-pts-num{font-size:20px;font-weight:900;color:var(--gold);}
.rank-pts-label{font-size:10px;color:var(--muted);}
.rank-bar-wrap{padding:0 16px 12px;}
.rank-bar{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:6px;}
.rank-bar-fill{height:100%;border-radius:99px;transition:width 0.6s;}
.bar-dy{background:var(--science);}
.bar-sy{background:var(--social);}
.subj-breakdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.break-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:0.5px solid var(--border);}
.break-row:last-child{border-bottom:none;}
.break-label{color:var(--muted);}
.break-scores{display:flex;gap:12px;}
.break-dy{color:var(--science);font-weight:700;}
.break-sy{color:var(--social);font-weight:700;}

/* STATS SCREEN */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.stat-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;}
.stat-val{font-size:28px;font-weight:900;}
.stat-val.gold{color:var(--gold);}
.stat-val.sci{color:var(--science);}
.stat-val.soc{color:var(--social);}
.reset-btn{background:none;border:1px solid rgba(247,106,106,0.3);color:var(--danger);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:8px 16px;border-radius:99px;cursor:pointer;transition:all 0.15s;}
.reset-btn:hover{background:rgba(247,106,106,0.1);}

/* CONFETTI */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden;}
.confetti-piece{position:absolute;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="app">
  <nav id="main-nav">
    <div class="logo"><span class="q">Quiz</span>Battle<span class="logo-sub">for 다영 &amp; 서영</span></div>
    <div class="nav-actions">
      <button class="nav-btn active" onclick="showScreen('home')">홈</button>
      <button class="nav-btn" onclick="showScreen('ranking')">랭킹</button>
      <button class="nav-btn" onclick="showScreen('stats')">기록</button>
      <button class="nav-btn" onclick="goUserSelect()" title="사용자 변경">👤</button>
    </div>
  </nav>

  <!-- USER SELECT -->
  <div class="screen active" id="screen-userselect">
    <div class="us-logo"><span class="q">Quiz</span>Battle</div>
    <div class="us-sub">누가 도전할 건가요? 🧠</div>
    <div class="us-q">나는 누구?</div>
    <div class="us-cards">
      <div class="us-card dy" onclick="selectUser('dayoung')">
        <div class="us-emoji">🌿</div>
        <div class="us-name">박다영</div>
        <div class="us-grade">중학교 3학년</div>
      </div>
      <div class="us-card sy" onclick="selectUser('seoyoung')">
        <div class="us-emoji">🌸</div>
        <div class="us-name">박서영</div>
        <div class="us-grade">초등학교 5학년</div>
      </div>
    </div>
    <button id="us-back" onclick="showScreen('home')">← 돌아가기</button>
  </div>

  <!-- HOME -->
  <div class="screen" id="screen-home">
    <button onclick="goUserSelect()" style="background:none;border:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;padding:0 0 10px 0;text-align:left;">← 사용자 변경</button>
    <p class="greeting"><span class="wave">👋</span> <span id="greeting-name"></span></p>
    <p class="date-str" id="date-str"></p>

    <!-- 주간 랭킹 미리보기 -->
    <div class="rank-card">
      <div class="rank-title">🏆 이번 주 랭킹</div>
      <div id="home-rank-list"></div>
    </div>

    <div class="section-hd">과목 선택</div>
    <div class="subj-grid">
      <div class="subj-card sci" id="card-sci" onclick="selectSubject('science')">
        <div class="subj-icon">🔬</div>
        <div class="subj-name">과학</div>
        <div class="subj-cnt" id="sci-cnt"></div>
      </div>
      <div class="subj-card soc" id="card-soc" onclick="selectSubject('social')">
        <div class="subj-icon">🌍</div>
        <div class="subj-name">사회</div>
        <div class="subj-cnt" id="soc-cnt"></div>
      </div>
    </div>
    <button class="btn-primary" onclick="startGame()">도전 시작!</button>
    <button class="btn-secondary" onclick="showScreen('ranking')">🏆 전체 랭킹 보기</button>
  </div>

  <!-- GAME -->
  <div class="screen" id="screen-game">
    <div class="g-header">
      <div class="g-score-wrap">
        <div class="g-score">점수 <span id="g-score">0</span></div>
        <span class="g-subj-tag" id="g-subj-tag"></span>
      </div>
      <div class="timer-wrap">
        <div class="combo-badge" id="combo-badge">COMBO!</div>
        <div class="timer-circle">
          <svg class="timer-svg" width="58" height="58" viewBox="0 0 58 58">
            <circle id="timer-ring" cx="29" cy="29" r="26" fill="none" stroke="var(--gold)" stroke-width="3" stroke-dasharray="163.4" stroke-dashoffset="0" stroke-linecap="round"/>
          </svg>
          <span class="timer-num" id="timer-num">60</span>
        </div>
      </div>
    </div>
    <div class="q-counter" id="q-counter">문제 1 / 10</div>
    <div class="q-card">
      <div class="q-text" id="q-text"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-wrap">
      <div class="r-emoji" id="r-emoji">🎉</div>
      <div class="r-title" id="r-title"></div>
      <div class="r-sub" id="r-sub"></div>
      <div class="r-stats">
        <div class="rs-card"><div class="rs-val gold" id="r-score">0</div><div class="rs-label">점수</div></div>
        <div class="rs-card"><div class="rs-val sci" id="r-correct">0%</div><div class="rs-label">정답률</div></div>
        <div class="rs-card"><div class="rs-val" style="color:var(--gold)" id="r-combo">0</div><div class="rs-label">최고 콤보</div></div>
      </div>
      <button class="btn-primary" onclick="showScreen('home')">홈으로</button>
      <button class="btn-secondary" onclick="startGame()">한 판 더!</button>
    </div>
  </div>

  <!-- RANKING -->
  <div class="screen" id="screen-ranking">
    <div class="section-hd" style="margin-bottom:4px;">🏆 주간 랭킹</div>
    <div class="week-label" id="week-label"></div>
    <div class="rank-big" id="rank-big"></div>
    <div class="section-hd">과목별 점수</div>
    <div class="subj-breakdown" id="subj-breakdown"></div>
    <button class="btn-secondary" onclick="showScreen('home')">홈으로</button>
  </div>

  <!-- STATS -->
  <div class="screen" id="screen-stats">
    <div class="section-hd" style="margin-bottom:12px;">📊 내 기록</div>
    <div class="stat-grid" id="stat-grid"></div>
    <div class="section-hd" style="margin-bottom:8px;">⚠️ 데이터 초기화</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="reset-btn" onclick="resetUser('dayoung')">🌿 다영 초기화</button>
      <button class="reset-btn" onclick="resetUser('seoyoung')">🌸 서영 초기화</button>
      <button class="reset-btn" onclick="resetUser('all')">전체 초기화</button>
    </div>
  </div>
</div>
<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
const QUIZ_DB = {

// ── 다영 (중3) 과학 ────────────────────────────────────────────
dayoung_science: [
  // 중3 교과
  {q:"세포에서 에너지를 생산하는 세포 소기관은?", a:"미토콘드리아", choices:["미토콘드리아","리보솜","골지체","핵"]},
  {q:"광합성이 일어나는 세포 소기관은?", a:"엽록체", choices:["엽록체","미토콘드리아","핵","세포막"]},
  {q:"DNA가 들어있는 세포 소기관은?", a:"핵", choices:["핵","미토콘드리아","리보솜","세포벽"]},
  {q:"단백질을 합성하는 세포 소기관은?", a:"리보솜", choices:["리보솜","골지체","액포","엽록체"]},
  {q:"식물 세포에만 있는 구조가 아닌 것은?", a:"미토콘드리아", choices:["미토콘드리아","세포벽","엽록체","액포"]},
  {q:"세포분열 시 유전 정보를 전달하는 물질은?", a:"DNA", choices:["DNA","RNA","단백질","지질"]},
  {q:"체세포 분열의 목적은?", a:"생장과 재생", choices:["생장과 재생","생식세포 형성","유전자 재조합","염색체 수 감소"]},

};
const SUBJECTS = {
  science: { name:'과학', icon:'🔬', cls:'sci', tagCls:'tag-sci' },
  social:  { name:'사회', icon:'🌍', cls:'soc', tagCls:'tag-soc' },
};
const TIMER_MAX = 163.4;

// ── STATE ──────────────────────────────────────────────────────
let state = {
  currentUser: null,
  currentSubject: 'science',
  data: {
    dayoung:  { totalScore:0, weekScore:0, weekScoreSci:0, weekScoreSoc:0, weekStart:null, totalSci:0, totalSoc:0, streak:0, lastDate:null },
    seoyoung: { totalScore:0, weekScore:0, weekScoreSci:0, weekScoreSoc:0, weekStart:null, totalSci:0, totalSoc:0, streak:0, lastDate:null },
  }
};
let gameQ=[], qIdx=0, score=0, combo=0, maxCombo=0, correct=0;
let timerInt=null, timeLeft=60;

function save(){ localStorage.setItem('qb1_state', JSON.stringify(state)); }
function load(){
  const d = localStorage.getItem('qb1_state');
  if(d){
    const s = JSON.parse(d);
    state.currentUser = s.currentUser || null;
    if(s.data){
      ['dayoung','seoyoung'].forEach(u=>{
        if(s.data[u]) state.data[u] = {...state.data[u], ...s.data[u]};
      });
    }
    if(s.currentSubject) state.currentSubject = s.currentSubject;
  }
  // 주간 초기화 체크
  checkWeekReset();
}
function ud(){ return state.data[state.currentUser]; }

function getWeekStart(){
  const now = new Date();
  const d = new Date(now);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay()); // 이번 주 일요일
  return d.toDateString();
}
function checkWeekReset(){
  const ws = getWeekStart();
  ['dayoung','seoyoung'].forEach(u=>{
    if(state.data[u].weekStart !== ws){
      state.data[u].weekScore = 0;
      state.data[u].weekScoreSci = 0;
      state.data[u].weekScoreSoc = 0;
      state.data[u].weekStart = ws;
    }
  });
  save();
}

// ── SCREENS ────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{ s.classList.remove('active'); s.style.display=''; });
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const s = document.getElementById('screen-'+id);
  s.classList.add('active'); s.style.display='flex';
  const navMap = {home:0, ranking:1, stats:2};
  if(navMap[id]!==undefined) document.querySelectorAll('.nav-btn')[navMap[id]].classList.add('active');
  document.getElementById('main-nav').style.display = (id==='userselect') ? 'none' : 'flex';
  const backBtn = document.getElementById('us-back');
  if(backBtn) backBtn.style.display = (id==='userselect' && state.currentUser) ? 'inline-block' : 'none';
  if(id==='home') renderHome();
  if(id==='ranking') renderRanking();
  if(id==='stats') renderStats();
}

// ── GAME ───────────────────────────────────────────────────────
function getPool(subj){
  const key = state.currentUser + '_' + subj;
  return QUIZ_DB[key] || [];
}

function startGame(){
  if(!state.currentUser){ showScreen('userselect'); return; }
  const pool = getPool(state.currentSubject);
  if(pool.length===0){ alert('이 과목에 문제가 없어요!'); return; }
  gameQ = shuffle([...pool]).slice(0, Math.min(10, pool.length));
  qIdx=0; score=0; combo=0; maxCombo=0; correct=0;

  const subj = SUBJECTS[state.currentSubject];
  const tag = document.getElementById('g-subj-tag');
  tag.textContent = subj.icon + ' ' + subj.name;
  tag.className = 'g-subj-tag ' + subj.tagCls;

  showScreen('game');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  nextQ();
}

function nextQ(){
  if(qIdx >= gameQ.length){ endGame(); return; }
  const q = gameQ[qIdx];
  document.getElementById('q-counter').textContent = `문제 ${qIdx+1} / ${gameQ.length}`;
  document.getElementById('g-score').textContent = score;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const choices = shuffle([...q.choices]);
  const container = document.getElementById('choices');
  container.innerHTML = '';
  choices.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = ()=>answer(c, q.a, btn);
    container.appendChild(btn);
  });
  startTimer();
  qIdx++;
}

function startTimer(){
  clearInterval(timerInt); timeLeft=60; updateTimer();
  timerInt = setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0){ clearInterval(timerInt); timeUp(); }}, 1000);
}
function updateTimer(){
  document.getElementById('timer-num').textContent = timeLeft;
  const pct = timeLeft/60;
  document.getElementById('timer-ring').setAttribute('stroke-dashoffset', TIMER_MAX*(1-pct));
  document.getElementById('timer-ring').setAttribute('stroke', timeLeft>15?'var(--gold)':'var(--danger)');
}
function timeUp(){
  if(document.getElementById('feedback').textContent) return;
  combo=0; updateCombo();
  const fb=document.getElementById('feedback');
  fb.textContent='시간 초과! ⏰'; fb.className='feedback wrong';
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===gameQ[qIdx-1].a) b.classList.add('correct');
  });
  setTimeout(nextQ, 1300);
}
function answer(chosen, correct_a, btn){
  if(btn.disabled) return;
  clearInterval(timerInt);
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(chosen===correct_a){
    btn.classList.add('correct');
    combo++; if(combo>maxCombo) maxCombo=combo; correct++;
    const pts = 100 + (timeLeft*3) + (combo>1?combo*15:0);
    score += pts;
    fb.textContent = combo>1 ? `+${pts}점 🔥 ${combo}콤보!` : `+${pts}점 정답!`;
    fb.className='feedback correct';
    updateCombo();
  } else {
    btn.classList.add('wrong'); combo=0; updateCombo();
    document.querySelectorAll('.choice-btn').forEach(b=>{ if(b.textContent===correct_a) b.classList.add('correct'); });
    fb.textContent=`오답 — 정답: ${correct_a}`; fb.className='feedback wrong';
  }
  setTimeout(nextQ, 1300);
}
function updateCombo(){
  const badge=document.getElementById('combo-badge');
  if(combo>=2){ badge.textContent=`🔥 ${combo}콤보!`; badge.classList.add('show'); }
  else badge.classList.remove('show');
}

function endGame(){
  clearInterval(timerInt);
  const total=gameQ.length;
  const pct=Math.round(correct/total*100);
  const subj=state.currentSubject;

  // 점수 저장
  ud().totalScore += score;
  ud().weekScore  += score;
  if(subj==='science'){ ud().totalSci+=score; ud().weekScoreSci+=score; }
  else { ud().totalSoc+=score; ud().weekScoreSoc+=score; }

  // 스트릭
  const today=new Date().toDateString();
  if(ud().lastDate!==today){
    const yesterday=new Date(Date.now()-86400000).toDateString();
    ud().streak = ud().lastDate===yesterday ? ud().streak+1 : 1;
    ud().lastDate=today;
  }
  save();

  let emoji='😅', title='다음엔 더 잘할 수 있어!';
  if(pct>=90){emoji='🏆';title='완벽해요!';}
  else if(pct>=70){emoji='🎉';title='잘했어요!';}
  else if(pct>=50){emoji='👍';title='절반 이상!';}

  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-sub').textContent=`${correct}/${total}문제 정답`;
  document.getElementById('r-score').textContent=score.toLocaleString();
  document.getElementById('r-correct').textContent=pct+'%';
  document.getElementById('r-combo').textContent=maxCombo;

  if(pct>=90) shootConfetti(60);
  showScreen('result');
}

function resetUser(userId){
  const targets = userId==='all' ? ['dayoung','seoyoung'] : [userId];
  const name = userId==='all' ? '전체' : USERS[userId].name;
  if(!confirm(`${name}의 데이터를 초기화할까요?`)) return;
  targets.forEach(u=>{
    state.data[u]={totalScore:0,weekScore:0,weekScoreSci:0,weekScoreSoc:0,weekStart:getWeekStart(),totalSci:0,totalSoc:0,streak:0,lastDate:null};
  });
  save();
  renderStats();
  alert('✅ 초기화 완료!');
}

// ── UTILS ──────────────────────────────────────────────────────
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }
function shootConfetti(cnt=50){
  const wrap=document.getElementById('confetti-wrap');
  wrap.innerHTML='';
  const colors=['#f7c06a','#6af7b8','#7c9ef7','#f76a6a','#fff'];
  for(let i=0;i<cnt;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[~~(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    wrap.appendChild(el);
  }
  setTimeout(()=>wrap.innerHTML='',4000);
}

// ── INIT ───────────────────────────────────────────────────────
load();
state.currentUser = null;
showScreen('userselect');
</script>
