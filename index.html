<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WordBattle for 다영 &amp; 서영</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WordBattle">
<meta name="theme-color" content="#0f0f1a">
<script>
(function(){
  const svg = encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">'
    +'<rect width="512" height="512" rx="80" fill="#0f0f1a"/>'
    +'<text x="256" y="350" font-size="300" text-anchor="middle" fill="#7c6af7" font-family="Arial Black,sans-serif" font-weight="900">W</text>'
    +'</svg>'
  );
  const m = {
    name:'WordBattle for 다영 & 서영',short_name:'WordBattle',
    start_url:'./',display:'standalone',
    background_color:'#0f0f1a',theme_color:'#7c6af7',orientation:'portrait',
    icons:[{src:'data:image/svg+xml,'+svg,sizes:'512x512',type:'image/svg+xml'}]
  };
  const blob = new Blob([JSON.stringify(m)],{type:'application/json'});
  const link = document.createElement('link');
  link.rel='manifest'; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #22223a;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6af7; --accent2: #f7c06a; --accent3: #6af7b8; --danger: #f76a6a;
    --text: #f0eeff; --muted: rgba(240,238,255,0.45); --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .app { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .logo { font-size: 17px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.2; }
  .logo .wb { color: var(--accent); }
  .logo .sub-name { display: block; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab { background: none; border: none; color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; padding: 5px 10px; border-radius: 10px; cursor: pointer; transition: all 0.15s; }
  .nav-tab.active, .nav-tab:hover { background: var(--surface2); color: var(--text); }
  .nav-tab.active { color: var(--accent); }
  .nav-tab-user { font-size: 15px; padding: 5px 8px; }
  .screen { display: none; flex: 1; flex-direction: column; padding: 20px; }
  .screen.active { display: flex; }

  /* ── USER SELECT SCREEN ── */
  #screen-userselect {
    justify-content: center; align-items: center; gap: 0; padding: 40px 28px;
  }
  .us-logo { font-size: 32px; font-weight: 900; text-align: center; margin-bottom: 6px; }
  .us-logo .wb { color: var(--accent); }
  .us-subtitle { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 40px; }
  .us-question { font-size: 20px; font-weight: 900; text-align: center; margin-bottom: 24px; }
  .us-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
  .us-card {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 20px; padding: 28px 16px; text-align: center;
    cursor: pointer; transition: all 0.18s;
  }
  .us-card:hover { border-color: var(--accent); transform: translateY(-2px); background: rgba(124,106,247,0.08); }
  .us-card .us-emoji { font-size: 52px; margin-bottom: 12px; }
  .us-card .us-name { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
  .us-card .us-tag { font-size: 12px; color: var(--muted); }
  .us-card.dayoung { border-color: rgba(106,247,184,0.3); }
  .us-card.dayoung:hover { border-color: #6af7b8; background: rgba(106,247,184,0.06); }
  .us-card.seoyoung { border-color: rgba(249,154,255,0.3); }
  .us-card.seoyoung:hover { border-color: #f99aff; background: rgba(249,154,255,0.06); }
  .us-switch { margin-top: 28px; font-size: 12px; color: var(--muted); text-align: center; cursor: pointer; text-decoration: underline; }
  .us-switch:hover { color: var(--accent); }
  .us-reset-wrap { margin-top: 24px; text-align: center; }
  .us-reset-btn {
    background: none; border: 1px solid rgba(247,106,106,0.4); color: var(--danger);
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    padding: 8px 20px; border-radius: 99px; cursor: pointer; transition: all 0.15s;
  }
  .us-reset-btn:hover { background: rgba(247,106,106,0.1); border-color: var(--danger); }

  /* ── LEVEL GRID ── */
  .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .level-card { border: 2px solid var(--border); border-radius: var(--radius); padding: 14px 12px; cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden; background: var(--surface); }
  .level-card:hover:not(.locked) { border-color: var(--accent); background: rgba(124,106,247,0.06); }
  .level-card.selected { border-color: var(--accent); background: rgba(124,106,247,0.12); }
  .level-card.locked { opacity: 0.45; cursor: not-allowed; }
  .level-card .lv-badge { font-size: 10px; font-weight: 900; letter-spacing: 0.07em; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-bottom: 6px; }
  .level-card .lv-name { font-size: 15px; font-weight: 900; margin-bottom: 2px; }
  .level-card .lv-desc { font-size: 11px; color: var(--muted); }
  .level-card .lv-prog { font-size: 10px; color: var(--accent3); font-weight: 700; margin-top: 6px; }
  .level-card .lv-lock-note { font-size: 10px; color: var(--muted); margin-top: 5px; }
  .level-card.final-lv { grid-column: 1 / -1; }
  .lock-icon { position: absolute; top: 10px; right: 10px; font-size: 14px; }
  .lv1 { background: rgba(106,247,184,0.18); color: #3ddba4; }
  .lv2 { background: rgba(124,106,247,0.18); color: #a99af9; }
  .lv3 { background: rgba(247,192,106,0.18); color: #f7c06a; }
  .lv4 { background: rgba(247,106,106,0.18); color: #f76a6a; }
  .lvF { background: rgba(255,215,0,0.15); color: #ffd700; }

  /* ── HOME ── */
  .greeting { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
  .greeting .wave { display: inline-block; animation: wave 1.5s ease-in-out infinite; }
  @keyframes wave { 0%,100%{transform:rotate(0)} 30%{transform:rotate(20deg)} 60%{transform:rotate(-10deg)} }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .stat-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 4px; text-transform: uppercase; }
  .stat-val { font-size: 26px; font-weight: 900; }
  .stat-val.accent { color: var(--accent); } .stat-val.accent2 { color: var(--accent2); } .stat-val.accent3 { color: var(--accent3); }
  .section-header { font-size: 12px; font-weight: 800; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 10px; text-transform: uppercase; }
  .progress-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
  .progress-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 99px; transition: width 0.5s; }
  .btn-primary { background: var(--accent); color: white; border: none; padding: 15px; border-radius: var(--radius); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; width: 100%; transition: transform 0.1s, opacity 0.1s; }
  .btn-primary:hover { opacity: 0.9; } .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 13px; border-radius: var(--radius); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; transition: background 0.15s; }
  .btn-secondary:hover { background: var(--surface); }
  .streak-bar { display: flex; gap: 4px; margin-bottom: 14px; }
  .streak-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--surface2); }
  .streak-dot.done { background: var(--accent2); }

  /* ── GAME ── */
  .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .game-score { font-size: 13px; font-weight: 700; color: var(--muted); }
  .game-score span { color: var(--accent2); font-size: 19px; font-weight: 900; }
  .timer-wrap { display: flex; align-items: center; gap: 8px; }
  .timer-circle { width: 48px; height: 48px; border-radius: 50%; border: 3px solid var(--surface2); position: relative; display: flex; align-items: center; justify-content: center; }
  .timer-num { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; }
  .timer-svg { position: absolute; top: -3px; left: -3px; transform: rotate(-90deg); }
  .combo-badge { background: var(--accent2); color: #1a1a00; font-size: 11px; font-weight: 900; padding: 3px 8px; border-radius: 99px; opacity: 0; transition: opacity 0.2s; letter-spacing: 0.05em; }
  .combo-badge.show { opacity: 1; }
  .game-level-tag { font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-top: 3px; }
  .word-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px 20px; text-align: center; margin-bottom: 18px; animation: slideIn 0.25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .word-type { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 8px; }
  .word-main { font-size: 30px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; line-height: 1.2; }
  .word-hint { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 8px; display: none; }
  .word-hint.show { display: block; }
  .hint-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 99px; cursor: pointer; margin-top: 8px; transition: all 0.15s; }
  .hint-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sound-btn { background: none; border: none; cursor: pointer; margin-top: 8px; color: var(--accent); font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border: 1px solid rgba(124,106,247,0.3); border-radius: 99px; transition: all 0.15s; }
  .sound-btn:hover { background: rgba(124,106,247,0.1); }
  .sound-icon { width: 13px; height: 13px; fill: var(--accent); }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .choice-btn { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 13px 10px; text-align: center; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; transition: all 0.15s; line-height: 1.3; }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(124,106,247,0.08); }
  .choice-btn.correct { border-color: var(--accent3); background: rgba(106,247,184,0.12); color: var(--accent3); }
  .choice-btn.wrong { border-color: var(--danger); background: rgba(247,106,106,0.12); color: var(--danger); }
  .choice-btn:disabled { cursor: default; }
  .feedback { text-align: center; font-size: 13px; font-weight: 800; height: 22px; transition: all 0.2s; }
  .feedback.correct { color: var(--accent3); } .feedback.wrong { color: var(--danger); }

  /* ── RESULT ── */
  .result-screen { text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
  .result-emoji { font-size: 60px; margin-bottom: 14px; }
  .result-title { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
  .result-sub { color: var(--muted); font-size: 14px; margin-bottom: 8px; }
  .result-level-tag { font-size: 11px; font-weight: 900; padding: 3px 12px; border-radius: 99px; display: inline-block; margin-bottom: 20px; }
  .result-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
  .rs-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .rs-val { font-size: 22px; font-weight: 900; margin-bottom: 2px; }
  .rs-label { font-size: 10px; color: var(--muted); font-weight: 700; }

  /* ── PERFECT SCORE BANNER ── */
  .perfect-banner {
    width: 100%; border-radius: 18px; padding: 20px 18px; margin-bottom: 18px;
    text-align: center; animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    display: none;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
  .perfect-banner.uncle-msg {
    background: linear-gradient(135deg, rgba(124,106,247,0.25), rgba(106,247,184,0.15));
    border: 2px solid rgba(124,106,247,0.5);
  }
  .perfect-banner.baby-msg {
    background: linear-gradient(135deg, rgba(255,200,80,0.2), rgba(255,100,150,0.15));
    border: 2px solid rgba(255,200,80,0.5);
  }
  .perfect-banner .pb-icon { font-size: 40px; margin-bottom: 8px; }
  .perfect-banner .pb-title { font-size: 16px; font-weight: 900; margin-bottom: 6px; }
  .perfect-banner .pb-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .baby-photo-wrap {
    width: 160px; height: 160px; border-radius: 50%; overflow: hidden;
    margin: 12px auto; border: 4px solid #ffd700;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--muted); text-align: center;
  }
  .baby-photo-wrap img { width: 100%; height: 100%; object-fit: cover; }

  /* ── REVIEW ── */
  .section-title { font-size: 17px; font-weight: 900; margin-bottom: 8px; }
  .review-filter { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 99px; cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: rgba(124,106,247,0.15); border-color: var(--accent); color: var(--accent); }
  .wrong-list { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }
  .wrong-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
  .wi-word { font-size: 17px; font-weight: 900; }
  .wi-meaning { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .wi-meta { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
  .wi-count { font-size: 11px; color: var(--danger); font-weight: 800; }
  .wi-lv { font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 99px; }
  .wi-sound { background: none; border: 1px solid var(--border); border-radius: 99px; padding: 4px 10px; color: var(--accent); cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; }
  .empty-state { text-align: center; color: var(--muted); padding: 60px 0; font-size: 14px; }

  /* ── WORDS ── */
  .words-level-tabs { display: flex; gap: 4px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
  .wl-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 99px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .wl-tab.active { background: rgba(124,106,247,0.15); border-color: var(--accent); color: var(--accent); }
  .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .inp { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600; padding: 9px 11px; border-radius: 10px; outline: none; width: 100%; transition: border-color 0.15s; }
  .inp:focus { border-color: var(--accent); } .inp::placeholder { color: var(--muted); }
  .select-inp { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'Nunito', sans-serif; font-size: 13px; padding: 9px 11px; border-radius: 10px; outline: none; width: 100%; cursor: pointer; }
  .btn-add { background: var(--accent3); color: #001a0d; border: none; padding: 9px; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; width: 100%; }
  .word-list { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }
  .wl-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; }
  .wl-eng { font-size: 15px; font-weight: 800; }
  .wl-kor { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .wl-tag { font-size: 10px; padding: 1px 6px; border-radius: 99px; font-weight: 700; margin-left: 4px; }
  .wl-del { background: none; border: 1px solid rgba(247,106,106,0.3); color: var(--danger); border-radius: 8px; padding: 3px 7px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: 'Nunito', sans-serif; }
  .wl-del:hover { background: rgba(247,106,106,0.1); }
  .custom-tag { background: rgba(106,247,184,0.15); color: var(--accent3); }

  /* ── CONFETTI ── */
  .confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="app">
  <nav>
    <div class="logo">Word<span class="wb">Battle</span><span class="sub-name" id="nav-subname">for 다영 &amp; 서영</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showScreen('home')">홈</button>
      <button class="nav-tab" onclick="showScreen('review')">오답</button>
      <button class="nav-tab" onclick="showScreen('words')">단어장</button>
      <button class="nav-tab nav-tab-user" onclick="showScreen('userselect')" title="사용자 변경">👤</button>
    </div>
  </nav>

  <!-- USER SELECT -->
  <div class="screen active" id="screen-userselect" style="display:flex;">
    <div class="us-logo">Word<span class="wb">Battle</span></div>
    <div class="us-subtitle">누가 도전할 건가요? 👇</div>
    <div class="us-question">나는 누구?</div>
    <div class="us-cards">
      <div class="us-card dayoung" onclick="selectUser('dayoung')">
        <div class="us-emoji">🌿</div>
        <div class="us-name">박다영</div>
        <div class="us-tag">영단어 도전!</div>
      </div>
      <div class="us-card seoyoung" onclick="selectUser('seoyoung')">
        <div class="us-emoji">🌸</div>
        <div class="us-name">박서영</div>
        <div class="us-tag">영단어 도전!</div>
      </div>
    </div>
    <div class="us-reset-wrap">
      <button class="us-reset-btn" onclick="resetUserData()">🗑️ 데이터 초기화</button>
    </div>
  </div>

  <!-- HOME -->
  <div class="screen" id="screen-home">
    <button onclick="showScreen('userselect')" style="background:none;border:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;padding:0 0 10px 0;display:flex;align-items:center;gap:4px;transition:color 0.15s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">← 사용자 변경</button>
    <p class="greeting"><span class="wave">👋</span> <span id="greeting-name">오늘도 단어 정복!</span></p>
    <p class="sub" id="today-date"></p>
    <div class="streak-bar" id="streak-bar"></div>
    <div class="stat-row">

const TIMER_MAX=150.8;

function save(){ localStorage.setItem('wb4_state', JSON.stringify(state)); }
function load(){
  const d=localStorage.getItem('wb4_state');
  if(d){
    const saved=JSON.parse(d);
    // 깊은 병합
    state.currentUser=saved.currentUser||null;
    if(saved.userData){
      ['dayoung','seoyoung'].forEach(u=>{
        if(saved.userData[u]) state.userData[u]={...state.userData[u],...saved.userData[u]};
        if(!state.userData[u].words) state.userData[u].words=[];
        if(!state.userData[u].wrongWords) state.userData[u].wrongWords={};
        if(!state.userData[u].masteredWords) state.userData[u].masteredWords={};
        if(!state.userData[u].consecutivePerfect) state.userData[u].consecutivePerfect=0;
      });
    }
    if(saved.taeyanPhoto) state.taeyanPhoto=saved.taeyanPhoto;
  }
}

function ud(){ return state.userData[state.currentUser]; } // 현재 유저 데이터 단축

// ── USER SELECT ───────────────────────────────────────────────
function resetUserData(){
  const target = confirm(
    "⚠️ 데이터 초기화\n\n"
    + "누구의 데이터를 초기화할까요?\n\n"
    + "확인 → 전체 초기화\n취소 → 선택"
  );
  if(target){
    // 전체 초기화
    if(!confirm("정말 전체 데이터를 초기화할까요?\n(다영·서영 모두 삭제됩니다)")) return;
    ['dayoung','seoyoung'].forEach(u=>{
      state.userData[u] = { words:[], wrongWords:{}, masteredWords:{}, totalScore:0, streak:0, lastPlayDate:null, selectedLevel:1, consecutivePerfect:0 };
    });
    save();
    alert("✅ 전체 데이터가 초기화되었습니다.");
  } else {
    // 개별 선택
    const who = prompt("초기화할 사람을 입력하세요\n1 = 박다영\n2 = 박서영");
    const userId = who==='1'?'dayoung':who==='2'?'seoyoung':null;
    if(!userId){ alert("취소되었습니다."); return; }
    const name = userId==='dayoung'?'박다영':'박서영';
    if(!confirm(name + "의 데이터를 초기화할까요?")) return;
    state.userData[userId] = { words:[], wrongWords:{}, masteredWords:{}, totalScore:0, streak:0, lastPlayDate:null, selectedLevel:1, consecutivePerfect:0 };
    save();
    alert("✅ " + name + "의 데이터가 초기화되었습니다.");
  }
}

function selectUser(userId){
  state.currentUser=userId;
  save();
  const cfg=USER_CONFIG[userId];
  // nav 업데이트
  document.getElementById('nav-subname').textContent=cfg.name+'의 WordBattle';
  showScreen('home');
}

// ── SCREEN ────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='';});
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const s=document.getElementById('screen-'+id);
  s.classList.add('active');
  s.style.display='flex';
  const map={home:0,review:1,words:2};
  if(map[id]!==undefined) document.querySelectorAll('.nav-tab')[map[id]].classList.add('active');
  if(id==='home') updateHome();
  if(id==='review') renderReview();
  if(id==='words') renderWords();
}

// ── HOME ──────────────────────────────────────────────────────
function getWordsForLevel(lvl){
  const base=(WORD_DB[lvl]||[]).map(w=>({...w,lvl}));
  const custom=(state.currentUser?ud().words:[]).filter(w=>w.custom&&parseInt(w.lvl)===lvl);
  return [...base,...custom];
}
function getAllWords(){
  let all=[];
  for(let l=1;l<=5;l++) all=all.concat(getWordsForLevel(l));
  return all;
}
function getMasteredCount(){ return Object.keys(ud().masteredWords).length; }
function getTotalWordCount(){ return getAllWords().length; }

function renderLevelGrid(){
  const grid=document.getElementById('level-grid');
  const mastered=getMasteredCount();
  grid.innerHTML=LEVELS.map(lv=>{
    const unlocked=mastered>=lv.unlock;
    const pool=getWordsForLevel(lv.id);
    const lvMastered=pool.filter(w=>ud().masteredWords[w.e]).length;
    const sel=ud().selectedLevel===lv.id;
    const isFinal=lv.id===5;
    return `<div class="level-card ${isFinal?'final-lv':''} ${sel?'selected':''} ${unlocked?'':'locked'}"
      onclick="${unlocked?`selectLevel(${lv.id})`:`alert('${lv.name}은 단어 ${lv.unlock}개 습득 시 해금!\\n현재: ${mastered}개 습득')`}">
      ${!unlocked?'<span class="lock-icon">🔒</span>':''}
      <div class="lv-badge ${lv.key}">${lv.name}</div>
      ${lv.desc?`<div class="lv-name">${lv.desc}</div>`:''}
      <div class="lv-desc">${pool.length}개 단어</div>
      ${unlocked
        ?`<div class="lv-prog">${lvMastered}/${pool.length} 습득</div>`
        :`<div class="lv-lock-note">🔒 ${lv.unlock}개 습득 시 해금</div>`}
    </div>`;
  }).join('');
}

function selectLevel(lvl){ ud().selectedLevel=lvl; save(); renderLevelGrid(); }

function updateHome(){
  if(!state.currentUser){ showScreen('userselect'); return; }
  const cfg=USER_CONFIG[state.currentUser];
  const total=getTotalWordCount(),mastered=getMasteredCount();
  const greeting=cfg.greetings[Math.floor(Math.random()*cfg.greetings.length)];
  document.getElementById('greeting-name').textContent=greeting;
  document.getElementById('stat-streak').textContent=ud().streak;
  document.getElementById('stat-total-score').textContent=ud().totalScore.toLocaleString();
  document.getElementById('progress-text').textContent=`${mastered} / ${total} 단어`;
  document.getElementById('progress-fill').style.width=total?`${Math.round(mastered/total*100)}%`:'0%';
  const bar=document.getElementById('streak-bar');
  bar.innerHTML='';
  for(let i=0;i<7;i++){const d=document.createElement('div');d.className='streak-dot'+(i<ud().streak?' done':'');bar.appendChild(d);}
  document.getElementById('today-date').textContent=new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});
  renderLevelGrid();
}

// ── GAME ──────────────────────────────────────────────────────
function startGame(wrongOnly=false){
  if(!state.currentUser){ showScreen('userselect'); return; }
  reviewMode=wrongOnly;
  let pool;
  if(wrongOnly){
    pool=getAllWords().filter(w=>ud().wrongWords[w.e]&&ud().wrongWords[w.e]>0);
  } else {
    pool=getWordsForLevel(ud().selectedLevel);
  }
  if(pool.length===0){alert(wrongOnly?'오답 단어가 없어요!':'이 레벨에 단어가 없어요!');return;}
  gameWords=shuffle([...pool]).slice(0,Math.min(10,pool.length));
  currentQ=0;score=0;combo=0;maxCombo=0;correctCount=0;
  const lv=LEVELS.find(l=>l.id===(wrongOnly?1:ud().selectedLevel));
  document.getElementById('g-level-tag').textContent=wrongOnly?'오답 복습':lv.name;
  document.getElementById('g-level-tag').className='game-level-tag '+(wrongOnly?'lv1':lv.key);
  showScreen('game');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  nextQuestion();
}

function nextQuestion(){
  if(currentQ>=gameWords.length){endGame();return;}
  answered=false;
  currentWord=gameWords[currentQ];
  const isEngToKor=Math.random()>0.3;
  document.getElementById('q-counter').textContent=`문제 ${currentQ+1} / ${gameWords.length}`;
  document.getElementById('g-score').textContent=score;
  document.getElementById('word-type').textContent=isEngToKor?'영어 → 한국어':'한국어 → 영어';
  document.getElementById('word-main').textContent=isEngToKor?currentWord.e:currentWord.k;
  document.getElementById('word-hint').className='word-hint';
  // 예문 힌트: 정답 단어를 ____로 마스킹
  const rawEx = currentWord.ex||'';
  const maskedEx = maskHint(rawEx, currentWord.e, currentWord.k, isEngToKor);
  document.getElementById('word-hint').textContent=maskedEx;
  document.getElementById('hint-btn').style.display=currentWord.ex?'inline-block':'none';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('sound-btn').style.display=isEngToKor?'inline-flex':'none';
  if(isEngToKor) document.getElementById('sound-btn').dataset.word=currentWord.e;
  const pool=getWordsForLevel(currentWord.lvl||ud().selectedLevel);
  const correct=isEngToKor?currentWord.k:currentWord.e;
  const others=shuffle(pool.filter(w=>w.e!==currentWord.e)).slice(0,3).map(w=>isEngToKor?w.k:w.e);
  const choices=shuffle([correct,...others]);
  const container=document.getElementById('choices');
  container.innerHTML='';
  choices.forEach(c=>{
    const btn=document.createElement('button');btn.className='choice-btn';btn.textContent=c;
    btn.onclick=()=>answer(c,correct,btn);container.appendChild(btn);
  });
  startTimer();currentQ++;
}

function startTimer(){
  clearInterval(timerInterval);timeLeft=15;updateTimerUI();
  timerInterval=setInterval(()=>{timeLeft--;updateTimerUI();if(timeLeft<=0){clearInterval(timerInterval);timeUp();}},1000);
}
function updateTimerUI(){
  document.getElementById('timer-num').textContent=timeLeft;
  const pct=timeLeft/15;
  document.getElementById('timer-ring').setAttribute('stroke-dashoffset',TIMER_MAX*(1-pct));
  document.getElementById('timer-ring').setAttribute('stroke',timeLeft>5?'var(--accent)':'var(--danger)');
}
function timeUp(){
  if(answered)return;answered=true;combo=0;updateCombo();
  if(currentWord){ud().wrongWords[currentWord.e]=(ud().wrongWords[currentWord.e]||0)+1;save();}
  const fb=document.getElementById('feedback');fb.textContent='시간 초과! ⏰';fb.className='feedback wrong';
  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.disabled=true;
    const isE=document.getElementById('word-type').textContent.includes('영어 →');
    if(btn.textContent===(isE?currentWord.k:currentWord.e))btn.classList.add('correct');
  });
  setTimeout(nextQuestion,1200);
}
function answer(chosen,correct,btn){
  if(answered)return;answered=true;clearInterval(timerInterval);
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  if(chosen===correct){
    btn.classList.add('correct');combo++;if(combo>maxCombo)maxCombo=combo;correctCount++;
    const pts=100+(timeLeft*5)+(combo>1?combo*20:0);
    score+=pts;ud().totalScore+=pts;ud().masteredWords[currentWord.e]=true;
    const fb=document.getElementById('feedback');
    fb.textContent=combo>1?`+${pts}점 🔥 ${combo}콤보!`:`+${pts}점 정답!`;fb.className='feedback correct';
    updateCombo();save();
  } else {
    btn.classList.add('wrong');combo=0;updateCombo();
    ud().wrongWords[currentWord.e]=(ud().wrongWords[currentWord.e]||0)+1;
    const fb=document.getElementById('feedback');fb.textContent=`오답 — 정답: ${correct}`;fb.className='feedback wrong';
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
    save();
  }
  setTimeout(nextQuestion,1200);
}
function updateCombo(){
  const badge=document.getElementById('combo-badge');
  if(combo>=2){badge.textContent=`COMBO x${combo}`;badge.classList.add('show');}
  else badge.classList.remove('show');
}

// ── END GAME & SPECIAL MESSAGES ───────────────────────────────
function endGame(){
  clearInterval(timerInterval);
  const total=gameWords.length;
  const pct=Math.round(correctCount/total*100);
  const isPerfect=(correctCount===total && total===10);

  // 연속 만점 카운트 갱신
  if(isPerfect){
    ud().consecutivePerfect=(ud().consecutivePerfect||0)+1;
  } else {
    ud().consecutivePerfect=0;
  }
  const consecutive=ud().consecutivePerfect;

  // 기본 결과
  let emoji='😅',title='계속 노력해요!';
  if(pct>=90){emoji='🏆';title='완벽해요!';}
  else if(pct>=70){emoji='🎉';title='잘했어요!';}
  else if(pct>=50){emoji='👍';title='절반 이상!';}
  const lv=LEVELS.find(l=>l.id===ud().selectedLevel);
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-sub').textContent=`${correctCount}/${total}문제 정답`;
  document.getElementById('r-level-tag').textContent=reviewMode?'오답 복습':lv.name;
  document.getElementById('r-level-tag').className='result-level-tag '+(reviewMode?'lv1':lv.key);
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-correct').textContent=pct+'%';
  document.getElementById('r-combo').textContent=maxCombo;

  // 스트릭
  const today=new Date().toDateString();
  if(ud().lastPlayDate!==today){
    const yesterday=new Date(Date.now()-86400000).toDateString();
    ud().streak=ud().lastPlayDate===yesterday?ud().streak+1:1;
    ud().lastPlayDate=today;save();
  }

  // 배너 초기화
  document.getElementById('uncle-banner').style.display='none';
  document.getElementById('baby-banner').style.display='none';

  const cfg=USER_CONFIG[state.currentUser];

  if(isPerfect){
    if(consecutive>=2){
      // 2연속 만점 → 태양이 사진 + 누나 자랑스럽다
      document.getElementById('uncle-banner').style.display='none';
      const babyBanner=document.getElementById('baby-banner');
      babyBanner.style.display='block';
      document.getElementById('baby-title').textContent=`태양이도 ${cfg.name}누나 응원해! ☀️`;
      document.getElementById('baby-text').textContent=cfg.babyMessages[0];
      // 사진 처리
      const bwrap=document.getElementById('baby-photo-wrap');
      if(state.taeyanPhoto){
        bwrap.innerHTML='<img id="ty-img" src="'+state.taeyanPhoto+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />';
        if(state.taeyanPhoto2){
          const photos=[state.taeyanPhoto, state.taeyanPhoto2];
          let si=0;
          setInterval(()=>{ si=(si+1)%2; const el=document.getElementById('ty-img'); if(el) el.src=photos[si]; }, 2200);
        }
      }
      shootConfetti(80,'gold');
    } else {
      // 첫 10/10 → 삼촌 격려
      const uncleBanner=document.getElementById('uncle-banner');
      uncleBanner.style.display='block';
      const msgs=cfg.uncleMessages;
      document.getElementById('uncle-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
      document.getElementById('uncle-title').textContent=`삼촌은 ${cfg.name}이가 해낼 줄 알았어! 🎖️`;
      shootConfetti(60,'purple');
    }
  }

  save();
  showScreen('result');
}

// ── CONFETTI ──────────────────────────────────────────────────
function shootConfetti(count=60, theme='purple'){
  const wrap=document.getElementById('confetti-wrap');
  wrap.innerHTML='';
  const colors = theme==='gold'
    ? ['#ffd700','#ffb300','#ff8c00','#ffe066','#fff0a0']
    : ['#7c6af7','#6af7b8','#f7c06a','#f76a6a','#a99af9','#fff'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'%';
    el.style.top='-10px';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(6+Math.random()*8)+'px';
    el.style.height=(6+Math.random()*8)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    el.style.animationDuration=(1.5+Math.random()*2)+'s';
    el.style.animationDelay=(Math.random()*0.8)+'s';
    wrap.appendChild(el);
  }
  setTimeout(()=>wrap.innerHTML='',4000);
}

function showHint(){document.getElementById('word-hint').classList.add('show');document.getElementById('hint-btn').style.display='none';}
function speakWord(){const w=document.getElementById('sound-btn').dataset.word;if(!w)return;const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.9;speechSynthesis.speak(u);}

// ── REVIEW ────────────────────────────────────────────────────
function renderReview(){
  if(!state.currentUser)return;
  const filterDiv=document.getElementById('review-filter');
  const filters=[['all','전체'],['1','L1'],['2','L2'],['3','L3'],['4','L4'],['5','Final']];
  filterDiv.innerHTML=filters.map(([v,l])=>`<button class="filter-btn ${reviewFilter===v?'active':''}" onclick="setReviewFilter('${v}')">${l}</button>`).join('');
  const all=getAllWords();
  let entries=Object.entries(ud().wrongWords).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(reviewFilter!=='all') entries=entries.filter(([e])=>{const w=all.find(x=>x.e===e);return w&&String(w.lvl||1)===reviewFilter;});
  const list=document.getElementById('wrong-list');
  if(entries.length===0){list.innerHTML='<div class="empty-state">오답 단어가 없어요!<br>게임을 먼저 플레이해보세요.</div>';return;}
  list.innerHTML=entries.map(([eng,cnt])=>{
    const w=all.find(x=>x.e===eng);if(!w)return'';
    const lv=LEVELS.find(l=>l.id===(w.lvl||1));
    return `<div class="wrong-item">
      <div>
        <div class="wi-word">${w.e}</div>
        <div class="wi-meaning">${w.k}</div>
        <div class="wi-meta"><span class="wi-count">틀린 횟수: ${cnt}번</span><span class="wi-lv ${lv.key}">${lv.name}</span></div>
      </div>
      <button class="wi-sound" onclick="speakDirect('${w.e}')">발음</button>
    </div>`;
  }).join('');
}
function setReviewFilter(f){reviewFilter=f;renderReview();}
function speakDirect(word){const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.9;speechSynthesis.speak(u);}

// ── WORD MANAGE ───────────────────────────────────────────────
function renderWords(){
  if(!state.currentUser)return;
  const tabs=document.getElementById('words-level-tabs');
  tabs.innerHTML=LEVELS.map(lv=>`<button class="wl-tab ${wordsFilter===lv.id?'active':''}" onclick="setWordsFilter(${lv.id})">${lv.name}</button>`).join('');
  const pool=getWordsForLevel(wordsFilter);
  document.getElementById('word-count-label').textContent=`${LEVELS.find(l=>l.id===wordsFilter).name} — ${pool.length}개 단어`;
  const list=document.getElementById('word-list');
  list.innerHTML=pool.map(w=>`
    <div class="wl-item">
      <div>
        <div class="wl-eng">${w.e}<span class="wl-tag ${w.custom?'custom-tag':'lv'+wordsFilter}">${w.custom?'직접 추가':'기본'}</span></div>
        <div class="wl-kor">${w.k}</div>
      </div>
      ${w.custom?`<button class="wl-del" onclick="deleteWord('${w.e}')">삭제</button>`:''}
    </div>`).join('');
}
function setWordsFilter(f){wordsFilter=f;renderWords();}
function addWord(){
  if(!state.currentUser)return;
  const eng=document.getElementById('inp-eng').value.trim();
  const kor=document.getElementById('inp-kor').value.trim();
  const ex=document.getElementById('inp-ex').value.trim();
  const lvl=parseInt(document.getElementById('inp-level').value);
  if(!eng||!kor){alert('영어와 한국어 뜻을 모두 입력해주세요.');return;}
  const all=getAllWords();
  if(all.find(w=>w.e.toLowerCase()===eng.toLowerCase())){alert('이미 있는 단어입니다.');return;}
  ud().words.push({e:eng,k:kor,ex:ex||'',custom:true,lvl});
  save();
  document.getElementById('inp-eng').value='';document.getElementById('inp-kor').value='';document.getElementById('inp-ex').value='';
  wordsFilter=lvl;renderWords();
}
function deleteWord(eng){
  if(!confirm('이 단어를 삭제할까요?'))return;
  ud().words=ud().words.filter(w=>w.e!==eng);
  delete ud().wrongWords[eng];delete ud().masteredWords[eng];
  save();renderWords();
}
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

// ── HINT MASKING ──────────────────────────────────────────────
function maskHint(ex, engWord, korWord, isEngToKor){
  if(!ex) return "";
  // 정답이 되는 단어를 ____로 치환
  const target = isEngToKor ? engWord : korWord;
  // 대소문자 무시하여 영단어 마스킹
  const regex = new RegExp(engWord.replace(/[-\/\\^$*+?.()|[\]{}]/g,"\\$&"), "gi");
  const blank = "____";
  return ex.replace(regex, blank);
}

// ── PWA 홈 화면 추가 안내 ─────────────────────────────────────
let deferredInstallPrompt = null;

// 안드로이드 Chrome: 설치 프롬프트 이벤트 미리 잡아두기
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // 배너에 "설치하기" 버튼 노출
  showPwaBanner();
});

window.addEventListener("appinstalled", () => {
  const banner = document.getElementById("pwa-banner");
  if(banner) banner.style.display = "none";
  deferredInstallPrompt = null;
});

function triggerInstall(){
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(()=>{ deferredInstallPrompt=null; });
  }
}

function showPwaBanner(){
  const banner = document.getElementById("pwa-banner");
  const guide = document.getElementById("pwa-guide");
  if(!banner) return;
  const ua = navigator.userAgent;
  const isIOS = /iphone|ipad|ipod/i.test(ua);
  const isStandalone = window.navigator.standalone || window.matchMedia("(display-mode: standalone)").matches;
  if(isStandalone) return;
  if(deferredInstallPrompt){
    // 안드로이드: 버튼 클릭으로 바로 설치 가능
    guide.innerHTML = '<button onclick="triggerInstall()" style="' +
      'margin-top:6px;background:var(--accent);color:white;border:none;' +
      'padding:8px 20px;border-radius:99px;font-family:\'Nunito\',sans-serif;' +
      'font-size:13px;font-weight:800;cursor:pointer;">📲 홈 화면에 설치하기</button>';
    banner.style.display = "block";
  } else if(isIOS){
    // iOS Safari: 수동 안내
    guide.innerHTML = "Safari 하단 <strong style='color:var(--text)'>공유 버튼(□↑)</strong> → <strong style='color:var(--text)'>'홈 화면에 추가'</strong> 탭";
    banner.style.display = "block";
  }
}


// ── INIT ──────────────────────────────────────────────────────
load();
// 항상 유저 선택 화면부터 시작 (점수·진도 데이터는 유지)
state.currentUser = null;
showScreen('userselect');
// PWA 홈 화면 추가 안내 (홈 화면 진입 시 표시)
// iOS는 beforeinstallprompt 없으므로 직접 호출
setTimeout(()=>{ if(!deferredInstallPrompt) showPwaBanner(); }, 1500);
</script>
